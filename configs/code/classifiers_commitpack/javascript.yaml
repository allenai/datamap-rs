name: javascript_commitpack_classifier
text_field: new_contents
pipeline:
    - name: gzip_annotator
      kwargs:
          text_field: new_contents
          anno_field: metadata.gzip_compression_ratio

    - name: ultrafineweb_annotator
      kwargs:
          text_field: new_contents
          output_field: metadata.stack_edu_redux
          max_text_length: 10000
          fast_text_file: /mnt/raid0/ai2-llm/classifiers/code-quality/trained_models/fasttext/stack_edu_redux_ultrafine_bin5/JavaScript/model.bin
    - name: linear_transform_annotator
      kwargs:
          features:
              - field: metadata.stack_edu_redux.__label__bin1
                weight: -0.422587
              - field: metadata.stack_edu_redux.__label__bin2
                weight: -0.161862
              - field: metadata.stack_edu_redux.__label__bin3
                weight: 0.062411
              - field: metadata.stack_edu_redux.__label__bin4
                weight: 0.318134
              - field: metadata.stack_edu_redux.__label__bin5
                weight: 0.203366
          bias: 0.424235
          output_field: metadata.stack_edu_redux_combined

    - name: ultrafineweb_annotator
      kwargs:
          text_field: message
          output_field: metadata.stack_edu_commit_message
          max_text_length: 10000
          fast_text_file: /mnt/raid0/ai2-llm/classifiers/code-quality/trained_models/fasttext/commitpack_commit_message_ultrafine_bin5/model.bin
    - name: linear_transform_annotator
      kwargs:
          features:
              - field: metadata.stack_edu_commit_message.__label__bin1
                weight: -0.463222
              - field: metadata.stack_edu_commit_message.__label__bin2
                weight: -0.230667
              - field: metadata.stack_edu_commit_message.__label__bin3
                weight: -0.008987
              - field: metadata.stack_edu_commit_message.__label__bin4
                weight: 0.251128
              - field: metadata.stack_edu_commit_message.__label__bin5
                weight: 0.451173
          bias: 0.484604
          output_field: metadata.stack_edu_commit_message_combined

    - name: jq_annotator
      kwargs:
          expression: '((.metadata.stack_edu_redux_combined // 0) * (.metadata.stack_edu_commit_message_combined // 0)) | sqrt | [., 1] | min | [., 0] | max'
          output_field: metadata.combined_quality_score

    - name: jq_annotator
      kwargs:
          expression: '((.old_contents // "") | gsub("^\\s+|\\s+$"; "")) + "\n\n\n" + ((.message // "") | gsub("^\\s+|\\s+$"; "")) + "\n\n\n" + ((.new_contents // "") | gsub("^\\s+|\\s+$"; ""))'
          output_field: text
