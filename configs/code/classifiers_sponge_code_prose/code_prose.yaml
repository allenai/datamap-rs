name: code_prose_classifier
text_field: text
pipeline:
    - name: gzip_annotator
      kwargs:
          text_field: text
          anno_field: metadata.gzip_compression_ratio

    - name: ultrafineweb_annotator
      kwargs:
          text_field: text
          output_field: metadata.code_prose
          max_text_length: 10000
          fast_text_file: /mnt/raid0/ai2-llm/classifiers/code-quality/trained_models/fasttext/code_prose_ultrafine_bin5/model.bin
    - name: linear_transform_annotator
      kwargs:
          features:
              - field: metadata.code_prose.__label__bin1
                weight: -0.510474
              - field: metadata.code_prose.__label__bin2
                weight: -0.260926
              - field: metadata.code_prose.__label__bin3
                weight: 0.003981
              - field: metadata.code_prose.__label__bin4
                weight: 0.254108
              - field: metadata.code_prose.__label__bin5
                weight: 0.513035
          bias: 0.503497
          output_field: metadata.code_prose_combined
